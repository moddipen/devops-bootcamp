apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-dashboard
  namespace: devops-bootcamp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-dashboard
  template:
    metadata:
      labels:
        app: health-dashboard
    spec:
      containers:
        - name: health-dashboard
          image: devops-bootcamp-app:latest
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              value: db
            - name: DB_NAME
              value: healthdb
            - name: DB_USER
              value: admin
            - name: DB_PASSWORD
              value: securepassword123
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /ping
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: health-dashboard-service
  namespace: devops-bootcamp
spec:
  selector:
    app: health-dashboard
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
